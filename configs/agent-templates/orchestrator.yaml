name: orchestrator
image: dieaudit/mock-agent:local
command: ["python", "/app/mock_agent.py"]
env:
  AGENT_ROLE: orchestrator
model_profile: orchestrator-long-context
acp_endpoint:
  transport: http
  port: 8000
workspace_mount:
  target: /workspace
  read_only: true
artifact_mount:
  target: /artifacts
  read_only: false
required_mcp:
  - filesystem-mcp
  - code-search-mcp
network_policy:
  allow_gateway: true
  allow_mcp: true
  allow_external_network: false
read_only: false
healthcheck: null
output_schema:
  type: object
