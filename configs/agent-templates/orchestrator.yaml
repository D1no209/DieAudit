name: orchestrator
image: dieaudit/mock-agent:local
command: ["python", "/app/mock_agent.py"]
env:
  AGENT_ROLE: orchestrator
model_profile: orchestrator-long-context
protocol:
  kind: legacy-http
  transport: http
  port: 8000
  future:
    agent_client_protocol:
      transport: stdio
      stdio_command: ["agent-binary", "--stdio"]
    a2a:
      agent_card_url: http://orchestrator:8000/.well-known/agent-card.json
acp_endpoint:
  transport: http
  port: 8000
workspace_mount:
  target: /workspace
  read_only: true
artifact_mount:
  target: /artifacts
  read_only: false
required_mcp:
  - filesystem-mcp
  - code-search-mcp
network_policy:
  allow_gateway: true
  allow_mcp: true
  allow_external_network: false
read_only: false
healthcheck: null
output_schema:
  type: object
