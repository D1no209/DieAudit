name: kimi-recon-auditor
image: dieaudit/kimi-code-agent:local
command: ["python", "/app/acp_runner.py"]
env:
  AGENT_ROLE: recon-auditor
  ACP_RUNTIME_NAME: kimi
  KIMI_DISABLE_TELEMETRY: "1"
  KIMI_CODE_NO_AUTO_UPDATE: "1"
model_profile: auditor-strong
protocol:
  kind: agent-client-protocol
  transport: stdio
  stdio_command: ["kimi-code", "acp"]
  runtime: kimi
workspace_mount:
  target: /workspace
  read_only: false
artifact_mount:
  target: /artifacts
  read_only: false
runtime_mount:
  target: /dieaudit/runtime
  read_only: true
required_mcp:
  - whiteboard-mcp
  - filesystem-mcp
  - code-search-mcp
  - codebase-memory-mcp
  - kb-mcp
network_policy:
  allow_gateway: true
  allow_mcp: true
  allow_external_network: false
read_only: false
healthcheck: null
instruction: recon-auditor.md
output_schema:
  type: object
