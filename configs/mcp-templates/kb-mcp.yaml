name: kb-mcp
image: dieaudit/tool-mcp:local
transport: http
port: 8001
mcp_endpoint: /mcp
env:
  MCP_NAME: kb-mcp
  KNOWLEDGE_API_URL: http://agent-gateway:8000
  ENFORCE_PROJECT_FILTER: "true"
mounts: []
resources:
  memory: 512m
healthcheck:
  Test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()"]
  Interval: 10000000000
  Timeout: 3000000000
  Retries: 10
tools:
  - search_knowledge
  - get_knowledge_document
permissions:
  project_filter: forced-by-agent-gateway
  platform_api: knowledge
  docker_api: false
read_only: false
