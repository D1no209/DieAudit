name: semgrep-mcp
image: dieaudit/tool-mcp:local
transport: http
port: 8001
mcp_endpoint: /mcp
env:
  MCP_NAME: semgrep-mcp
  WORKSPACE_ROOT: /workspace
  ARTIFACT_ROOT: /artifacts
workspace_mount:
  target: /workspace
  read_only: true
artifact_mount:
  target: /artifacts
  read_only: false
mounts: []
resources:
  memory: 2g
healthcheck:
  Test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()"]
  Interval: 10000000000
  Timeout: 3000000000
  Retries: 10
tools:
  - semgrep_scan
  - semgrep_results
permissions:
  workspace: read-only
  docker_api: false
read_only: false
