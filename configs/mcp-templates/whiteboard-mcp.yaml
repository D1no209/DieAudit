name: whiteboard-mcp
image: dieaudit/tool-mcp:local
transport: http
port: 8001
mcp_endpoint: /mcp
env:
  MCP_NAME: whiteboard-mcp
  WORKSPACE_ROOT: /workspace
workspace_mount:
  target: /workspace
  read_only: true
artifact_mount:
  target: /artifacts
  read_only: false
mounts: []
resources:
  memory: 512m
healthcheck:
  Test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()"]
  Interval: 10000000000
  Timeout: 3000000000
  Retries: 10
tools:
  - create_card
  - update_card
  - link_cards
  - add_note
  - list_graph
  - search_cards
  - find_attach_points
  - declare_gap
  - schedule_agent
  - subscribe_changes
  - list_notifications
  - mark_notification
  - request_agent_help
  - read_structure
  - submit_chain_evidence
permissions:
  workspace: read-only
  platform_api: audit
  docker_api: false
read_only: false
