name: joern-mcp
image: dieaudit/tool-mcp-joern:local
transport: http
port: 8001
mcp_endpoint: /mcp
env:
  MCP_NAME: joern-mcp
  WORKSPACE_ROOT: /workspace
  ARTIFACT_ROOT: /artifacts
  JAVA_TOOL_OPTIONS: -Djava.io.tmpdir=/joern-tmp
workspace_mount:
  target: /workspace
  read_only: true
artifact_mount:
  target: /artifacts
  read_only: false
mounts: []
resources:
  memory: 4g
  tmpfs:
    /tmp: rw,exec,nosuid,size=256m
    /joern-tmp: rw,exec,nosuid,size=512m
healthcheck:
  Test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()"]
  Interval: 10000000000
  Timeout: 3000000000
  Retries: 10
tools:
  - joern_query
  - joern_build_cpg
  - joern_list_cpgs
  - joern_run_script
  - joern_common_queries
required_binaries:
  - joern
permissions:
  workspace: read-only
  docker_api: false
read_only: false
