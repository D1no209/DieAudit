name: sandbox-mcp
image: dieaudit/mock-mcp:local
transport: http
port: 8001
env:
  MCP_NAME: sandbox-mcp
mounts: []
resources:
  memory: 512m
healthcheck:
  Test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()"]
  Interval: 10000000000
  Timeout: 3000000000
  Retries: 10
tools:
  - sandbox.exec_poc
  - sandbox.logs
permissions:
  docker_api: false
  execution: sandbox-runner-only
read_only: false
