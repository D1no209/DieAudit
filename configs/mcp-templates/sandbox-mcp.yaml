name: sandbox-mcp
image: dieaudit/tool-mcp:local
transport: http
port: 8001
mcp_endpoint: /mcp
env:
  MCP_NAME: sandbox-mcp
  PLATFORM_API_URL: http://agent-gateway:8000
mounts: []
resources:
  memory: 512m
healthcheck:
  Test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health').read()"]
  Interval: 10000000000
  Timeout: 3000000000
  Retries: 10
tools:
  - run_poc
  - start_sandbox_service
permissions:
  docker_api: false
  platform_api: sandbox
  execution: sandbox-runner-only
read_only: false
