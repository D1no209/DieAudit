global:
  scrape_interval: 15s

scrape_configs:
  - job_name: dieaudit
    metrics_path: /metrics
    static_configs:
      - targets:
          - web-api:8000
          - agent-gateway:8000
          - workflow-worker:8000
          - workspace-engine:8000
          - sandbox-runner:8000
          - kb-indexer:8000
