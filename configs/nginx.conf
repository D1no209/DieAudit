events {}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 80;
    client_max_body_size 300m;

    location /api/bff/ {
      set $web_api_upstream web-api:8000;
      proxy_pass http://$web_api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      set $web_api_upstream web-api:8000;
      rewrite ^/api/(.*)$ /$1 break;
      proxy_pass http://$web_api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gateway/ {
      set $agent_gateway_upstream legacy-platform-api:8000;
      rewrite ^/gateway/(.*)$ /$1 break;
      proxy_pass http://$agent_gateway_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 900s;
      proxy_send_timeout 900s;
    }

    location /assets/ {
      set $web_ui_upstream web-ui:80;
      proxy_pass http://$web_ui_upstream;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = / {
      set $web_ui_upstream web-ui:80;
      proxy_pass http://$web_ui_upstream;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
    }

    location = /index.html {
      set $web_ui_upstream web-ui:80;
      proxy_pass http://$web_ui_upstream;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
    }

    location / {
      set $web_ui_upstream web-ui:80;
      proxy_pass http://$web_ui_upstream;
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
    }
  }
}
