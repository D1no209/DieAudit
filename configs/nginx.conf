events {}

http {
  upstream web_ui {
    server web-ui:80;
  }

  upstream web_api {
    server web-api:8000;
  }

  upstream agent_gateway {
    server agent-gateway:8000;
  }

  server {
    listen 80;

    location /api/ {
      proxy_pass http://web_api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /gateway/ {
      proxy_pass http://agent_gateway/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://web_ui;
    }
  }
}
