name: ${COMPOSE_PROJECT_NAME:-dieaudit}

x-platform-env: &platform-env
  PYTHONUNBUFFERED: "1"
  POSTGRES_DSN: postgresql://${POSTGRES_USER:-dieaudit}:${POSTGRES_PASSWORD:-dieaudit}@postgres:5432/${POSTGRES_DB:-dieaudit}
  POSTGRES_ASYNC_DSN: postgresql+psycopg://${POSTGRES_USER:-dieaudit}:${POSTGRES_PASSWORD:-dieaudit}@postgres:5432/${POSTGRES_DB:-dieaudit}
  REDIS_URL: redis://redis:6379/0
  NATS_URL: nats://${NATS_USER:-dieaudit}:${NATS_PASSWORD:-dieaudit}@nats:4222
  QDRANT_URL: http://qdrant:6333
  KNOWLEDGE_COLLECTION_NAME: ${KNOWLEDGE_COLLECTION_NAME:-dieaudit_knowledge_v1}
  KNOWLEDGE_VECTOR_SIZE: ${KNOWLEDGE_VECTOR_SIZE:-1024}
  KNOWLEDGE_EMBEDDING_PROVIDER: ${KNOWLEDGE_EMBEDDING_PROVIDER:-hash}
  KNOWLEDGE_EMBEDDING_BASE_URL: ${KNOWLEDGE_EMBEDDING_BASE_URL:-}
  KNOWLEDGE_EMBEDDING_API_KEY: ${KNOWLEDGE_EMBEDDING_API_KEY:-}
  KNOWLEDGE_EMBEDDING_MODEL: ${KNOWLEDGE_EMBEDDING_MODEL:-text-embedding-3-small}
  KNOWLEDGE_EMBEDDING_TIMEOUT_SECONDS: ${KNOWLEDGE_EMBEDDING_TIMEOUT_SECONDS:-60}
  KNOWLEDGE_EMBEDDING_PROBE_ON_READINESS: ${KNOWLEDGE_EMBEDDING_PROBE_ON_READINESS:-true}
  TEMPORAL_ADDRESS: temporal:7233
  TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
  TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-dieaudit-audit-pipeline}
  DOCKER_HOST: ${DOCKER_HOST:-tcp://docker-socket-proxy:2375}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-}
  DIEAUDIT_API_KEY: ${DIEAUDIT_API_KEY:-}
  API_KEY_HEADER: ${API_KEY_HEADER:-X-DieAudit-Api-Key}
  PUBLIC_METRICS: ${PUBLIC_METRICS:-false}
  MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-104857600}
  MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-104857600}
  MAX_WORKSPACE_FILES: ${MAX_WORKSPACE_FILES:-20000}
  MAX_WORKSPACE_UNCOMPRESSED_BYTES: ${MAX_WORKSPACE_UNCOMPRESSED_BYTES:-536870912}
  ALLOWED_GIT_URL_SCHEMES: ${ALLOWED_GIT_URL_SCHEMES:-https,ssh}
  ALLOWED_GIT_HOSTS: ${ALLOWED_GIT_HOSTS:-}
  DEFAULT_CONTAINER_MEMORY: ${DEFAULT_CONTAINER_MEMORY:-1024m}
  DEFAULT_CONTAINER_CPUS: ${DEFAULT_CONTAINER_CPUS:-1.0}
  DEFAULT_CONTAINER_PIDS_LIMIT: ${DEFAULT_CONTAINER_PIDS_LIMIT:-512}
  DEFAULT_CONTAINER_TMPFS: ${DEFAULT_CONTAINER_TMPFS:-/tmp:rw,nosuid,size=128m}
  DEFAULT_SANDBOX_RUNTIME: ${DEFAULT_SANDBOX_RUNTIME:-runc}
  ENABLE_GVISOR: ${ENABLE_GVISOR:-false}
  ALLOW_RUNC_SANDBOX: ${ALLOW_RUNC_SANDBOX:-true}
  ALLOW_SANDBOX_EXTERNAL_NETWORK: ${ALLOW_SANDBOX_EXTERNAL_NETWORK:-false}
  PLATFORM_AUDIT_EVENT_RETENTION_DAYS: ${PLATFORM_AUDIT_EVENT_RETENTION_DAYS:-30}
  PLATFORM_AUDIT_EVENT_MAX_ROWS: ${PLATFORM_AUDIT_EVENT_MAX_ROWS:-10000}
  RUNTIME_PACKAGE_RETENTION_DAYS: ${RUNTIME_PACKAGE_RETENTION_DAYS:-7}
  UPLOAD_STAGING_RETENTION_DAYS: ${UPLOAD_STAGING_RETENTION_DAYS:-1}
  UNREFERENCED_WORKSPACE_RETENTION_DAYS: ${UNREFERENCED_WORKSPACE_RETENTION_DAYS:-30}
  UNREFERENCED_SNAPSHOT_RETENTION_DAYS: ${UNREFERENCED_SNAPSHOT_RETENTION_DAYS:-90}
  STORAGE_CLEANUP_MAX_ENTRIES: ${STORAGE_CLEANUP_MAX_ENTRIES:-500}
  PIPELINE_EXECUTION_BACKEND: ${PIPELINE_EXECUTION_BACKEND:-workflow-worker}
  PIPELINE_WORKER_POLL_INTERVAL_SECONDS: ${PIPELINE_WORKER_POLL_INTERVAL_SECONDS:-2}
  PIPELINE_WORKER_HEARTBEAT_INTERVAL_SECONDS: ${PIPELINE_WORKER_HEARTBEAT_INTERVAL_SECONDS:-5}
  PIPELINE_WORKER_HEARTBEAT_TTL_SECONDS: ${PIPELINE_WORKER_HEARTBEAT_TTL_SECONDS:-30}
  PIPELINE_WORKER_HEARTBEAT_RETENTION_SECONDS: ${PIPELINE_WORKER_HEARTBEAT_RETENTION_SECONDS:-3600}
  ENABLE_DEMO_TEMPLATES: ${ENABLE_DEMO_TEMPLATES:-false}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,::1},postgres,redis,nats,qdrant,temporal,web-api,agent-gateway,workspace-engine,sandbox-runner,kb-indexer,docker-socket-proxy
  no_proxy: ${NO_PROXY:-localhost,127.0.0.1,::1},postgres,redis,nats,qdrant,temporal,web-api,agent-gateway,workspace-engine,sandbox-runner,kb-indexer,docker-socket-proxy
  CONFIG_ROOT: /app/configs
  WORKSPACE_ROOT: /dieaudit/workspaces
  ARTIFACT_ROOT: /dieaudit/artifacts
  ARTIFACT_STORAGE_BACKEND: ${ARTIFACT_STORAGE_BACKEND:-local}
  DYNAMIC_CONTAINER_PREFIX: dieaudit
  AGENT_GATEWAY_CONTAINER_NAME: dieaudit-agent-gateway

x-platform-service: &platform-service
  build:
    context: .
    dockerfile: services/platform/Dockerfile
    args:
      HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
      HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
  restart: unless-stopped
  networks:
    - platform
  volumes:
    - ./configs:/app/configs
    - ./data/workspaces:/dieaudit/workspaces
    - ./data/artifacts:/dieaudit/artifacts
  environment:
    <<: *platform-env

services:
  nginx:
    image: nginx:1.27-alpine
    profiles: ["core", "demo"]
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:80"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web-ui:
        condition: service_started
      web-api:
        condition: service_healthy
      agent-gateway:
        condition: service_healthy
    networks:
      - platform

  web-ui:
    build:
      context: .
      dockerfile: services/web-ui/Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    profiles: ["core", "demo"]
    restart: unless-stopped
    networks:
      - platform

  web-api:
    <<: *platform-service
    profiles: ["core", "demo"]
    container_name: dieaudit-web-api
    environment:
      <<: *platform-env
      SERVICE_NAME: web-api
      AGENT_GATEWAY_URL: http://agent-gateway:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "${WEB_API_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 20

  workflow-worker:
    <<: *platform-service
    profiles: ["core", "demo"]
    container_name: dieaudit-workflow-worker
    command: ["python", "-m", "app.worker"]
    environment:
      <<: *platform-env
      SERVICE_NAME: workflow-worker
    depends_on:
      docker-socket-proxy:
        condition: service_started
      temporal:
        condition: service_started
      web-api:
        condition: service_healthy

  agent-gateway:
    <<: *platform-service
    profiles: ["core", "demo"]
    container_name: dieaudit-agent-gateway
    environment:
      <<: *platform-env
      SERVICE_NAME: agent-gateway
    depends_on:
      docker-socket-proxy:
        condition: service_started
      postgres:
        condition: service_healthy
      web-api:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    ports:
      - "${AGENT_GATEWAY_PORT:-18001}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 20

  workspace-engine:
    <<: *platform-service
    profiles: ["core", "demo"]
    container_name: dieaudit-workspace-engine
    environment:
      <<: *platform-env
      SERVICE_NAME: workspace-engine
  sandbox-runner:
    <<: *platform-service
    profiles: ["core", "demo"]
    container_name: dieaudit-sandbox-runner
    environment:
      <<: *platform-env
      SERVICE_NAME: sandbox-runner
    depends_on:
      docker-socket-proxy:
        condition: service_started

  kb-indexer:
    <<: *platform-service
    profiles: ["core", "demo"]
    container_name: dieaudit-kb-indexer
    environment:
      <<: *platform-env
      SERVICE_NAME: kb-indexer
    depends_on:
      qdrant:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    profiles: ["core", "demo"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dieaudit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dieaudit}
      POSTGRES_DB: ${POSTGRES_DB:-dieaudit}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dieaudit} -d ${POSTGRES_DB:-dieaudit}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - platform

  redis:
    image: redis:7-alpine
    profiles: ["core", "demo"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - platform

  nats:
    image: nats:2.10-alpine
    profiles: ["core", "demo"]
    restart: unless-stopped
    command: ["-js", "-m", "8222", "--user", "${NATS_USER:-dieaudit}", "--pass", "${NATS_PASSWORD:-dieaudit}"]
    ports:
      - "${NATS_MONITOR_PORT:-18222}:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - platform

  qdrant:
    image: qdrant/qdrant:v1.14.1
    profiles: ["core", "demo"]
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-16333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - platform

  temporal:
    image: temporalio/auto-setup:1.25.2
    profiles: ["core", "demo"]
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-dieaudit}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-dieaudit}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ./configs/temporal/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform

  temporal-ui:
    image: temporalio/ui:2.34.0
    profiles: ["core", "demo"]
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:${API_PORT:-8080}
    ports:
      - "${TEMPORAL_UI_PORT:-18088}:8080"
    depends_on:
      temporal:
        condition: service_started
    networks:
      - platform

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    profiles: ["core", "demo"]
    restart: unless-stopped
    environment:
      POST: "1"
      CONTAINERS: "1"
      IMAGES: "1"
      NETWORKS: "1"
      INFO: "1"
      PING: "1"
      VERSION: "1"
      SYSTEM: "1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - platform

  mock-agent-image:
    build:
      context: .
      dockerfile: services/mock-agent/Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    image: dieaudit/mock-agent:local
    profiles: ["demo"]
    command: ["python", "/app/mock_agent.py", "--idle"]
    networks:
      - platform

  mock-mcp-image:
    build:
      context: .
      dockerfile: services/mock-mcp/Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    image: dieaudit/mock-mcp:local
    profiles: ["demo"]
    command: ["python", "/app/mock_mcp.py"]
    networks:
      - platform

  tool-mcp-image:
    build:
      context: .
      dockerfile: services/mcp-tools/Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    image: dieaudit/tool-mcp:local
    profiles: ["demo", "tools"]
    command: ["python", "/app/tool_mcp.py"]
    networks:
      - platform

  tool-mcp-codeql-image:
    build:
      context: .
      dockerfile: services/mcp-tools/Dockerfile.codeql
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
        CODEQL_BUNDLE_VERSION: ${CODEQL_BUNDLE_VERSION:-2.25.6}
    image: dieaudit/tool-mcp-codeql:local
    profiles: ["experimental", "codeql"]
    command: ["python", "/app/tool_mcp.py"]
    networks:
      - platform

  tool-mcp-joern-image:
    build:
      context: .
      dockerfile: services/mcp-tools/Dockerfile.joern
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    image: dieaudit/tool-mcp-joern:local
    profiles: ["tools"]
    command: ["python3.12", "/app/tool_mcp.py"]
    networks:
      - platform

  opencode-agent-image:
    build:
      context: .
      dockerfile: services/agents/opencode-agent/Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    image: dieaudit/opencode-agent:local
    profiles: ["demo", "tools"]
    command: ["opencode", "--version"]
    networks:
      - platform

  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["observability"]
    volumes:
      - ./configs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "19090:9090"
    networks:
      - platform

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["observability"]
    ports:
      - "13000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./configs/observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/observability/grafana/dashboard-definitions:/var/lib/grafana/dashboards:ro
    networks:
      - platform

networks:
  platform:
    name: dieaudit-platform

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  grafana-data:
